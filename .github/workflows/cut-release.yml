# Cut Release — creates a release branch from master via GitHub API
# Branch creation via API (not git push) triggers release-build.yml reliably

name: Cut Release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version to release (e.g. 1.1.0). Defaults to version.properties.'
        required: false
        default: ''

jobs:
  cut:
    name: Cut Release Branch
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Resolve version
        id: version
        run: |
          INPUT="${{ inputs.version_name }}"
          if [ -n "$INPUT" ]; then
            NAME="$INPUT"
          else
            NAME=$(grep '^versionName=' version.properties | cut -d'=' -f2)
          fi
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "branch=release/${NAME}" >> $GITHUB_OUTPUT
          echo "Resolved version: $NAME (branch: release/${NAME})"

      - name: Guard — fail if release branch already exists
        run: |
          BRANCH="${{ steps.version.outputs.branch }}"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "ERROR: Branch $BRANCH already exists on remote."
            exit 1
          fi
          echo "Branch $BRANCH does not exist — safe to proceed"

      - name: Create release branch via API
        run: |
          BRANCH="${{ steps.version.outputs.branch }}"
          SHA=$(git rev-parse HEAD)
          gh api repos/${{ github.repository }}/git/refs \
            -X POST \
            -f ref="refs/heads/${BRANCH}" \
            -f sha="${SHA}"
          echo "Release branch ${BRANCH} created at ${SHA}."
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
