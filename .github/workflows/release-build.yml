# Release Build — manual full release build with version code + signing
# Tags the built commit and creates the GitHub Release.

name: Release Build

on:
  workflow_dispatch:

concurrency:
  group: release-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: relversion
        run: |
          NAME=$(grep '^versionName=' version.properties | cut -d'=' -f2)
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "Version: $NAME"

      - name: Guard — branch must match version.properties
        run: |
          BRANCH="${{ github.ref_name }}"
          NAME="${{ steps.relversion.outputs.name }}"
          if [ "$BRANCH" != "release/${NAME}" ]; then
            echo "ERROR: Branch '$BRANCH' does not match versionName '$NAME' (expected branch 'release/${NAME}')."
            echo "A merge likely brought master's version bump into this release branch."
            exit 1
          fi
          echo "Branch $BRANCH matches versionName $NAME"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks
          echo "Keystore file created"

      - name: Validate Keystore
        run: |
          if [ ! -f "app/keystore.jks" ]; then
            echo "Keystore file not found"
            exit 1
          fi
          echo "Keystore file found!"

      - name: Create Google Services JSON
        env:
          GOOGLE_SERVICES_DEBUG: ${{ secrets.GOOGLE_SERVICES_JSON_DEBUG }}
          GOOGLE_SERVICES_RELEASE: ${{ secrets.GOOGLE_SERVICES_JSON_RELEASE }}
        run: |
          mkdir -p app/src/debug app/src/release
          printf '%s' "$GOOGLE_SERVICES_DEBUG" > app/src/debug/google-services.json
          printf '%s' "$GOOGLE_SERVICES_RELEASE" > app/src/release/google-services.json
          if [ ! -f "app/src/debug/google-services.json" ] || [ ! -f "app/src/release/google-services.json" ]; then
            echo "ERROR: google-services.json files were not created"
            exit 1
          fi
          echo "Google Services JSON files created successfully"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Calculate week number
        id: week
        run: echo "number=$(date +%V)" >> $GITHUB_OUTPUT

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-week-${{ steps.week.outputs.number }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-
            gradle-

      - name: Calculate Version Code
        id: version
        run: |
          if [ -z "$VERSION_CODE_OFFSET" ]; then
            echo "ERROR: VERSION_CODE_OFFSET variable is required but not set"
            echo "Set it at: Settings → Secrets and variables → Actions → Variables"
            exit 1
          fi
          VERSION_CODE=$(( VERSION_CODE_OFFSET + ${{ github.run_number }} * 10 + ${{ github.run_attempt }} ))
          TAG="v${{ steps.relversion.outputs.name }}+${VERSION_CODE}"
          echo "code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Calculated VERSION_CODE: ${VERSION_CODE} (Base: ${VERSION_CODE_OFFSET}, Run: ${{ github.run_number }}, Attempt: ${{ github.run_attempt }}) — tag: ${TAG}"
          echo "${VERSION_CODE}" > version-code.txt
        env:
          VERSION_CODE_OFFSET: ${{ vars.VERSION_CODE_OFFSET }}

      - name: Guard — fail if tag or GitHub Release already exists
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "ERROR: GitHub Release $TAG already exists."
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "ERROR: Tag $TAG already exists."
            exit 1
          fi
          echo "No tag or release for $TAG — safe to proceed"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Release Bundle and Run Tests
        run: ./gradlew bundleRelease assembleRelease test validateDebugScreenshotTest
        env:
          VERSION_CODE: ${{ steps.version.outputs.code }}
          KEYSTORE_FILE: ${{ github.workspace }}/app/keystore.jks
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ENCRYPTION_PASSPHRASE: ${{ secrets.ENCRYPTION_PASSPHRASE }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/build/test-results/**/*.xml'

      - name: Upload Screenshot Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshot-test-results
          path: '**/build/reports/screenshotTest/**'

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Record commit SHA
        run: echo "${{ github.sha }}" > commit-sha.txt

      - name: Upload build info
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: |
            version-code.txt
            commit-sha.txt
          retention-days: 30

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${{ github.sha }}" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "Generating changelog since $PREV_TAG"
            LOG=$(git log "$PREV_TAG".."${{ github.sha }}" --pretty=format:"- %s" --no-merges)
          else
            echo "No previous tag found — including all commits"
            LOG=$(git log "${{ github.sha }}" --pretty=format:"- %s" --no-merges)
          fi
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Release ${{ steps.version.outputs.tag }}
          body: |
            ${{ steps.changelog.outputs.content }}

            ---
            **Build:** `${{ steps.version.outputs.code }}`
          files: app/build/outputs/apk/release/*.apk
